# ═══════════════════════════════════════════════
#  Shadow-Bot CI/CD — GitHub Actions
#  Trigger: push ke main/dev, pull request, release
# ═══════════════════════════════════════════════

name: ShadowBot CI

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Lint & static check
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check shadowbot/ --select E,F,W --ignore E501

  # ─────────────────────────────────────────────
  # Job 2: Test matrix (Python 3.10, 3.11, 3.12)
  # ─────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[full]"
          pip install pytest pytest-asyncio

      - name: Run import tests
        run: |
          python -c "
          from shadowbot.config import load_config, validate_config
          from shadowbot.memory import MemoryDB
          from shadowbot.rag import RAGEngine
          from shadowbot.tools import build_tools
          from shadowbot.providers import get_provider
          from shadowbot.agent.loop import AgentLoop
          print('All imports OK')
          "

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || \
          python -c "
          import asyncio, sys
          sys.path.insert(0, '.')
          from shadowbot.config import DEFAULT_CONFIG, validate_config
          from shadowbot.memory import MemoryDB
          from shadowbot.rag import RAGEngine
          from shadowbot.tools import BashTool, ReadFileTool, WriteFileTool

          # Config test
          config = dict(DEFAULT_CONFIG)
          config['provider'] = 'ollama'
          valid, msg = validate_config(config)
          assert valid, f'Config invalid: {msg}'
          print(f'✓ Config: {msg}')

          # Memory test
          mem = MemoryDB('/tmp/ci_memory.db')
          asyncio.run(mem.save_turn('ci question', 'ci answer', 'ci'))
          results = mem.search('ci')
          mem.close()
          print(f'✓ Memory: context={bool(mem.get_context())}')

          # RAG test
          rag = RAGEngine('/tmp/ci_rag.db')
          n = rag.add_document('python agent framework test', source='ci', title='CI Test')
          rag._rebuild_index()
          results = rag.search('python agent')
          rag.close()
          print(f'✓ RAG: added {n} chunks')

          # Tools test
          async def run_tools():
              wf = WriteFileTool()
              r1 = await wf.run('/tmp/ci_test.txt', 'hello ci')
              rf = ReadFileTool()
              r2 = await rf.run('/tmp/ci_test.txt')
              bash = BashTool(workspace_dir='/tmp')
              r3 = await bash.run('echo ci_ok')
              return r1, r2, r3
          r1, r2, r3 = asyncio.run(run_tools())
          assert 'written' in r1
          assert 'hello ci' in r2
          assert 'ci_ok' in r3
          print(f'✓ Tools: write/read/bash OK')

          print('All tests PASSED')
          "

      - name: Test CLI version
        run: python -m shadowbot.cli version

  # ─────────────────────────────────────────────
  # Job 3: Build & release (hanya saat tag v*.*.*)
  # ─────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Create zip archive
        run: |
          zip -r shadowbot-${{ github.ref_name }}.zip . \
            --exclude ".git/*" \
            --exclude "dist/*" \
            --exclude "*.egg-info/*" \
            --exclude "**/__pycache__/*" \
            --exclude "*.pyc"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            shadowbot-${{ github.ref_name }}.zip
          body: |
            ## ShadowBot ${{ github.ref_name }}

            Unified AI Agent — nanobot + NOMAD + OpenClaude

            ### Install di Termux
            ```bash
            pkg install python git
            git clone https://github.com/${{ github.repository }}.git
            cd shadowbot
            bash install_termux.sh
            ```

            ### Install via pip
            ```bash
            pip install shadowbot==${{ github.ref_name }}
            ```
